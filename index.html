<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zero to Hero – Language Learning</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- START SCREEN -->
    <section id="start-screen" class="screen active" aria-label="Start screen">
      <button id="logout-btn" class="quit-button" type="button">
  LOG OUT
</button>
      <h1 class="title">ZERO TO HERO</h1>
      <p class="subtitle" id="start-subtitle"></p>

      <div class="support-selector">
 <div id="support-pill" class="support-pill">
  <span id="support-short" class="support-short"></span>
  <span id="support-label"></span>
  <span class="chevron">▾</span>
</div>

  <div id="support-dropdown" class="support-dropdown hidden">
    <input
      id="support-search"
      class="support-search"
      type="search"
      autocomplete="off"
      placeholder="Search"
      aria-label="Search support languages"
    />
    <div id="support-options" class="support-options"></div>
  </div>
</div>

      <div class="button-grid" role="navigation" aria-label="Main actions">
        <button class="primary" id="open-app" type="button">OPEN APP</button>

        <a class="secondary" id="link-blueprint" target="_blank" rel="noopener noreferrer"></a>

<a class="secondary" id="link-skool" target="_blank" rel="noopener noreferrer"></a>

<a class="secondary" id="link-offer" target="_blank" rel="noopener noreferrer"></a>

      </div>
    </section>
    <!-- Language hub -->
    <section id="language-screen" class="screen" aria-label="Language hub">
  <h2 class="title small">LANGUAGES</h2>
  <p class="subtitle">Choose a language to study</p>

  <input
    id="language-search"
    class="language-search"
    type="search"
    autocomplete="off"
    placeholder="Search languages"
    aria-label="Search languages"
  />

  <div class="button-grid" id="language-buttons">
    <!-- Buttons will be rendered dynamically -->
  </div>

  <button id="hub-quit" class="quit-button" type="button">
    QUIT LEARNING
  </button>

  <button id="reset-user" class="quit-button" type="button"
          style="top:1.25rem; right:1.25rem; left:auto;">
    RESET PROGRESS
  </button>

</section>
    <!-- LEARNING SCREEN -->
    <section id="learning-screen" class="screen" aria-label="Learning screen">
      <button id="quit-learning" class="quit-button" type="button">QUIT LEARNING</button>
      <button id="alphabet-btn" class="quit-button alphabet-btn hidden" type="button" aria-label="Open alphabet guide">ABC</button>

      <div class="learning-wrap">
       <h2 class="title small">TODAY'S SESSION</h2>
<div id="progress-bar-container">
  <div id="progress-bar-fill"></div>
</div>

<p class="subtitle" id="session-subtitle">Vocab demo (data-driven)</p>


        <div id="content" class="content"></div>
      </div>
    </section>

  </div>
  <section id="pack-screen" class="screen">
  <h2 class="title small" id="pack-title">RESOURCE PACKS</h2>
  <p class="subtitle" id="pack-subtitle">Choose up to 2 packs</p>

  <div id="pack-buttons" class="button-grid"></div>

  <button id="start-run" class="primary">START</button>
</section>


  <!-- ALPHABET OVERLAY -->
  <div id="alphabet-overlay" class="alphabet-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="alphabet-overlay-title">
    <div class="alphabet-panel">
      <button id="alphabet-close" class="alphabet-close" type="button" aria-label="Close alphabet guide">✕</button>
      <h2 class="alphabet-overlay-title" id="alphabet-overlay-title"></h2>
      <div id="alphabet-content" class="alphabet-content"></div>
    </div>
  </div>

  <!-- FEEDBACK BUTTON (always visible) -->
  <button id="feedback-btn" class="feedback-btn" type="button" aria-label="Report a bug or give feedback">!</button>

  <!-- FEEDBACK MODAL -->
  <div id="feedback-modal" class="feedback-modal hidden" role="dialog" aria-modal="true" aria-labelledby="feedback-modal-title">
    <div class="feedback-panel">
      <button id="feedback-close" class="alphabet-close" type="button" aria-label="Close feedback">✕</button>
      <h2 class="feedback-modal-title" id="feedback-modal-title">Report a bug</h2>
      <p class="feedback-modal-subtitle">Tell us what went wrong — we read every report.</p>
      <textarea id="feedback-text" class="feedback-textarea" placeholder="Describe the issue..." rows="5"></textarea>
      <div id="feedback-context" class="feedback-context"></div>
      <button id="feedback-submit" class="primary feedback-submit-btn" type="button">Send report</button>
      <p id="feedback-status" class="feedback-status hidden"></p>
    </div>
  </div>

  <!-- Hidden Netlify form for form detection -->
  <form name="bug-report" data-netlify="true" hidden>
    <input name="message" />
    <input name="language" />
    <input name="level" />
    <input name="email" />
    <input name="version" />
  </form>

  <!-- User + run persistence (non-module) -->
<script src="user_state.js"></script>
<script type="module" src="app.js?v=1.0.0"></script>
</body>
</html>
