name: validate

# Every push and PR runs:
#  - validate: the data + generated-sentence validators, so broken
#    support-language sentences (missing prepositions, dangling
#    demonstratives, incompatible adjective/noun pairings, untranslated
#    concepts, …) are caught before they ever reach a learner
#  - e2e: the Playwright suite against the offline dev harness, so a change
#    that breaks the app itself (boot, login, setup funnel, any of the seven
#    exercise renderers, persistence) fails the build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # ESLint 10 needs util.styleText (Node >=20.19). CI's node version
          # is independent of the Netlify functions runtime (NODE_VERSION 18
          # in netlify.toml).
          node-version: "22"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:unit
      - name: Run validators
        run: npm run validate

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
